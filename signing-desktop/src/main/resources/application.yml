server:
  port: 8088

servlet:
  context-path: /


spring:

  servlet:

    servlet:
      multipart:
        enabled: true
        max-file-size: 50MB
        max-request-size: 50MB


logging:
  level:
    root: INFO
    com.lifetex.sign.service.OTPAuditLogService: DEBUG
    org.apache.pdfbox.pdmodel.interactive.digitalsignature.visible.PDFTemplateCreator: WARN
    org.apache.pdfbox.pdmodel.interactive.digitalsignature.visible.PDVisibleSigBuilder: WARN
    eu.europa.esig.dss.pdf.pdfbox.visible.defaultdrawer: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

  file:
    name: logs/desktop.log
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB
